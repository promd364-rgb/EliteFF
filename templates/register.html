<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Elite FF Tournament</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #0b0f19;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .form-container {
            background: #161b22;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 123, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .form-container h2 {
            color: #ff7b00;
            margin-bottom: 25px;
            font-size: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #a3a3a3;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            background: #0b0f19;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }
        .input-group input:focus {
            border-color: #ff7b00;
            outline: none;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #ff7b00;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            background: #ff9500;
        }
        .form-container p {
            margin-top: 20px;
            color: #a3a3a3;
            font-size: 14px;
        }
        .form-container p a {
            color: #ff7b00;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>🔥 REGISTER 🔥</h2>
    <form method="POST">
        {% csrf_data %} <!-- Django security-র জন্য এটা লাগবে -->
        {% csrf_token %}
        
        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" required placeholder="Enter username">
        </div>
        
        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" required placeholder="Enter email">
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password1" required placeholder="Enter password">
        </div>
        
        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" name="password2" required placeholder="Confirm password">
        </div>
        
        <button type="submit" class="btn">CREATE ACCOUNT</button>
    </form>
    
    <p>Already have an account? <a href="/login/">Login here</a></p>
</div>

</body>
</html>
